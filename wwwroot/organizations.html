<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKTMonitor - Организации</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🏢 Управление организациями</h1>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="openAddModal()">➕ Добавить организацию</button>
            <button class="btn btn-secondary" onclick="window.location.href='/kktmonitor/index.html'">← На главную</button>
        </div>
        
        <div id="loading" class="loading">Загрузка данных...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="table-container" style="display: none;">
            <table id="org-table">
                <thead>
                    <tr>
                        <th>Наименование организации</th>
                        <th>ИНН</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="org-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно для добавления/редактирования организации -->
    <div id="orgModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Добавление организации</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="form-group">
                <label>Наименование организации:</label>
                <input type="text" id="orgName" placeholder="Введите название">
            </div>
            <div class="form-group">
                <label>ИНН:</label>
                <input type="text" id="orgInn" placeholder="Введите ИНН (12 цифр)">
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveOrganization()">Сохранить</button>
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script src="/js/organizations.js"></script>
</body>
</html>
