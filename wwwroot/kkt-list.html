<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKTMonitor - Настройка списка ККМ</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .container {
            max-width: 1400px;
        }
        .api-url-section {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .api-url-section label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: #007bff;
        }
        .api-url-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
        }
        .add-form {
            background-color: #e7f3ff;
            border: 1px solid #b8daff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .add-form.visible {
            display: block;
        }
        .add-form-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .add-form-grid input, .add-form-grid select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .kkt-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }
        .kkt-table th, .kkt-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .kkt-table th {
            background-color: #007bff;
            color: white;
            font-weight: 600;
        }
        .kkt-table tr:hover {
            background-color: #f5f5f5;
        }
        .status-active {
            color: #28a745;
            font-weight: bold;
        }
        .status-inactive {
            color: #dc3545;
            font-weight: bold;
        }
        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
            margin: 0 2px;
        }
        .search-box {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .pagination {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 5px 10px;
            border: 1px solid #ddd;
            background-color: white;
            cursor: pointer;
            border-radius: 3px;
        }
        .pagination button.active {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        .pagination button:hover:not(.active) {
            background-color: #e9ecef;
        }
        .top-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-buttons">
            <button class="btn btn-secondary" onclick="window.location.href='/kktmonitor/'">🏠 Главная страница</button>
            <button class="btn btn-info" onclick="window.location.href='/kktmonitor/settings.html'">⚙️ Настройки</button>
        </div>
        
        <h1>📋 Настройка списка ККМ</h1>
        
        <div class="api-url-section">
            <label>🔗 API адрес для отправки списка адресов ККТ</label>
            <input type="text" id="apiUrl" value="/api/leases" readonly>
            <small style="color: #666; margin-top: 5px; display: block;">Адрес для получения списка ККМ из DHCP сервера</small>
        </div>
        
        <div class="btn-group" style="margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="showAddForm()">➕ Добавить ККТ вручную</button>
            <button class="btn btn-info" onclick="loadKktList()">🔄 Обновить список</button>
        </div>
        
        <!-- Форма добавления ККМ -->
        <div id="addForm" class="add-form">
            <h4 style="margin-top: 0; color: #007bff;">➕ Добавление ККМ вручную</h4>
            <div class="add-form-grid">
                <input type="text" id="newSerialNumber" placeholder="ЗН (Заводской номер)">
                <input type="text" id="newInn" placeholder="ИНН">
                <input type="text" id="newLegalName" placeholder="Организация">
                <input type="text" id="newNickname" placeholder="Прозвище">
                <input type="text" id="newIp" placeholder="IP адрес">
                <select id="newIsActive">
                    <option value="1">Активна</option>
                    <option value="0">Деактивирована</option>
                </select>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" onclick="addKkt()">✅ Добавить</button>
                <button class="btn btn-secondary" onclick="hideAddForm()">❌ Отмена</button>
            </div>
        </div>
        
        <!-- Поиск -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по ЗН, ИНН, организации, прозвищу, IP..." onkeyup="filterTable()">
        </div>
        
        <!-- Таблица ККМ -->
        <div style="overflow-x: auto;">
            <table class="kkt-table" id="kktTable">
                <thead>
                    <tr>
                        <th>ЗН (Заводской номер)</th>
                        <th>ИНН</th>
                        <th>Организация</th>
                        <th>Прозвище</th>
                        <th>IP адрес</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="kktTableBody">
                    <tr><td colspan="7" style="text-align: center;">Загрузка...<\/td><\/tr>
                </tbody>
            <\/table>
        <\/div>
        
        <!-- Пагинация -->
        <div class="pagination" id="pagination"></div>
        
        <div class="btn-group" style="margin-top: 20px; justify-content: center;">
            <button class="btn btn-secondary" onclick="window.location.href='/kktmonitor/settings.html'">← Назад к настройкам</button>
            <button class="btn btn-primary" onclick="loadKktList()">🔄 Обновить</button>
        <\/div>
    <\/div>
    
    <!-- Модальное окно для редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="editModalTitle">Редактирование ККМ<\/h3>
                <span class="close" onclick="closeEditModal()">&times;<\/span>
            <\/div>
            <div id="editModalBody">
                <div class="form-group">
                    <label>ЗН (Заводской номер):<\/label>
                    <input type="text" id="editSerialNumber" class="form-control">
                <\/div>
                <div class="form-group">
                    <label>ИНН:<\/label>
                    <input type="text" id="editInn" class="form-control">
                <\/div>
                <div class="form-group">
                    <label>Организация:<\/label>
                    <input type="text" id="editLegalName" class="form-control">
                <\/div>
                <div class="form-group">
                    <label>Прозвище:<\/label>
                    <input type="text" id="editNickname" class="form-control">
                <\/div>
                <div class="form-group">
                    <label>IP адрес:<\/label>
                    <input type="text" id="editIp" class="form-control">
                <\/div>
                <div class="form-group">
                    <label>Статус:<\/label>
                    <select id="editIsActive" class="form-control">
                        <option value="1">Активна<\/option>
                        <option value="0">Деактивирована<\/option>
                    <\/select>
                <\/div>
            <\/div>
            <div class="btn-group" style="margin-top: 15px;">
                <button class="btn btn-primary" onclick="saveEditKkt()">💾 Сохранить<\/button>
                <button class="btn btn-secondary" onclick="closeEditModal()">Отмена<\/button>
            <\/div>
        <\/div>
    <\/div>

    <script>
        let currentPage = 1;
        let rowsPerPage = 20;
        let allKkts = [];
        let filteredKkts = [];
        let editKktId = null;
        let passwordEntered = false;
        let passwordAttempted = false;

        // Проверка пароля при загрузке страницы (только один раз)
        function checkPassword() {
            if (passwordEntered || passwordAttempted) {
                if (!passwordEntered) {
                    window.location.href = '/kktmonitor/settings.html';
                }
                return;
            }
            
            passwordAttempted = true;
            
            const password = prompt('Введите пароль для доступа к настройке списка ККМ:');
            if (password === 'MonitoringKkt') {
                passwordEntered = true;
                loadKktList();
            } else if (password !== null) {
                alert('Неверный пароль! Доступ запрещён.');
                window.location.href = '/kktmonitor/settings.html';
            } else {
                window.location.href = '/kktmonitor/settings.html';
            }
        }

        async function loadKktList() {
            const tbody = document.getElementById('kktTableBody');
            if (tbody) tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Загрузка...<\/td><\/tr>';
            
            try {
                const response = await fetch('/api/kkt?includeInactive=true');
                if (!response.ok) throw new Error('Ошибка загрузки数据');
                
                allKkts = await response.json();
                console.log('Загружено ККМ:', allKkts);
                
                filterTable();
            } catch (error) {
                console.error('Ошибка:', error);
                if (tbody) tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Ошибка загрузки: ' + error.message + '<\/td><\/tr>';
            }
        }

        function filterTable() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            filteredKkts = allKkts.filter(kkt => {
                return (kkt.serialNumber && kkt.serialNumber.toLowerCase().includes(searchTerm)) ||
                       (kkt.inn && kkt.inn.toLowerCase().includes(searchTerm)) ||
                       (kkt.legalName && kkt.legalName.toLowerCase().includes(searchTerm)) ||
                       (kkt.nickname && kkt.nickname.toLowerCase().includes(searchTerm)) ||
                       (kkt.ip && kkt.ip.toLowerCase().includes(searchTerm));
            });
            
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('kktTableBody');
            if (!tbody) return;
            
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageKkts = filteredKkts.slice(start, end);
            
            if (pageKkts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Нет данных<\/td><\/tr>';
                const pagination = document.getElementById('pagination');
                if (pagination) pagination.innerHTML = '';
                return;
            }
            
            tbody.innerHTML = '';
            for (const kkt of pageKkts) {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = kkt.serialNumber || kkt.SerialNumber || '—';
                row.insertCell(1).textContent = kkt.inn || kkt.INN || '—';
                row.insertCell(2).textContent = kkt.legalName || kkt.LegalName || '—';
                row.insertCell(3).textContent = kkt.nickname || kkt.Nickname || '—';
                row.insertCell(4).textContent = kkt.ip || '—';
                
                const statusCell = row.insertCell(5);
                const isActive = (kkt.isActive !== false && kkt.IsActive !== false);
                statusCell.innerHTML = isActive ? 
                    '<span class="status-active">✅ Активна</span>' : 
                    '<span class="status-inactive">⛔ Деактивирована</span>';
                
                const actionsCell = row.insertCell(6);
                actionsCell.innerHTML = '<button class="btn btn-sm btn-primary" onclick="editKkt(' + kkt.id + ')">✏️ Ред.</button> ' +
                    '<button class="btn btn-sm btn-danger" onclick="deleteKkt(' + kkt.id + ')">🗑️ Удалить</button>';
            }
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredKkts.length / rowsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (!pagination) return;
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
            }
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        function showAddForm() {
            const addForm = document.getElementById('addForm');
            if (addForm) addForm.classList.add('visible');
        }

        function hideAddForm() {
            const addForm = document.getElementById('addForm');
            if (addForm) addForm.classList.remove('visible');
            const inputs = ['newSerialNumber', 'newInn', 'newLegalName', 'newNickname', 'newIp'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            const isActive = document.getElementById('newIsActive');
            if (isActive) isActive.value = '1';
        }

        async function addKkt() {
            const serialNumber = document.getElementById('newSerialNumber').value.trim();
            const inn = document.getElementById('newInn').value.trim();
            const legalName = document.getElementById('newLegalName').value.trim();
            const nickname = document.getElementById('newNickname').value.trim();
            const ip = document.getElementById('newIp').value.trim();
            const isActive = document.getElementById('newIsActive').value === '1';
            
            if (!ip) {
                alert('IP адрес обязателен для заполнения');
                return;
            }
            
            let legalEntityId = null;
            if (legalName && inn) {
                try {
                    const legalResponse = await fetch('/api/LegalEntity', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: legalName, inn: inn })
                    });
                    if (legalResponse.ok) {
                        const legal = await legalResponse.json();
                        legalEntityId = legal.id;
                    }
                } catch (error) {
                    console.error('Ошибка создания юрлица:', error);
                }
            }
            
            try {
                const response = await fetch('/api/kkt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        serialNumber: serialNumber,
                        inn: inn,
                        nickname: nickname,
                        ip: ip,
                        isActive: isActive,
                        legalEntityId: legalEntityId,
                        source: 'manual'
                    })
                });
                
                if (response.ok) {
                    alert('ККМ успешно добавлена');
                    hideAddForm();
                    loadKktList();
                } else {
                    const error = await response.json();
                    alert('Ошибка: ' + (error.error || 'Не удалось добавить ККМ'));
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function editKkt(id) {
            editKktId = id;
            const kkt = allKkts.find(k => k.id === id);
            if (!kkt) return;
            
            const editSerialNumber = document.getElementById('editSerialNumber');
            const editInn = document.getElementById('editInn');
            const editLegalName = document.getElementById('editLegalName');
            const editNickname = document.getElementById('editNickname');
            const editIp = document.getElementById('editIp');
            const editIsActive = document.getElementById('editIsActive');
            
            if (editSerialNumber) editSerialNumber.value = kkt.serialNumber || kkt.SerialNumber || '';
            if (editInn) editInn.value = kkt.inn || kkt.INN || '';
            if (editLegalName) editLegalName.value = kkt.legalName || kkt.LegalName || '';
            if (editNickname) editNickname.value = kkt.nickname || kkt.Nickname || '';
            if (editIp) editIp.value = kkt.ip || '';
            if (editIsActive) editIsActive.value = (kkt.isActive !== false && kkt.IsActive !== false) ? '1' : '0';
            
            const modal = document.getElementById('editModal');
            if (modal) modal.style.display = 'block';
        }

        async function saveEditKkt() {
            const serialNumber = document.getElementById('editSerialNumber').value.trim();
            const inn = document.getElementById('editInn').value.trim();
            const legalName = document.getElementById('editLegalName').value.trim();
            const nickname = document.getElementById('editNickname').value.trim();
            const ip = document.getElementById('editIp').value.trim();
            const isActive = document.getElementById('editIsActive').value === '1';
            
            if (!ip) {
                alert('IP адрес обязателен для заполнения');
                return;
            }
            
            try {
                const response = await fetch('/api/kkt/' + editKktId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: editKktId,
                        serialNumber: serialNumber,
                        inn: inn,
                        nickname: nickname,
                        ip: ip,
                        isActive: isActive
                    })
                });
                
                if (response.ok) {
                    alert('ККМ успешно обновлена');
                    closeEditModal();
                    loadKktList();
                } else {
                    const error = await response.json();
                    alert('Ошибка: ' + (error.error || 'Не удалось обновить ККМ'));
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function deleteKkt(id) {
            if (!confirm('Вы уверены, что хотите удалить эту ККМ? Данные будут потеряны безвозвратно.')) return;
            
            try {
                const response = await fetch('/api/kkt/' + id + '/permanent', { method: 'DELETE' });
                if (response.ok) {
                    alert('ККМ удалена');
                    loadKktList();
                } else {
                    alert('Ошибка при удалении');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            if (modal) modal.style.display = 'none';
            editKktId = null;
        }

        // Инициализация при загрузке страницы (только один раз)
        let isInitialized = false;
        document.addEventListener('DOMContentLoaded', function() {
            if (isInitialized) return;
            isInitialized = true;
            
            checkPassword();
            
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('keyup', filterTable);
            }
        });
        
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) closeEditModal();
        }
    <\/script>
<\/body>
<\/html>
